<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veteriner Kliniği</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body style="height: auto;">
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Veteriner Kliniği</a>
            <a class="navbar-brand" href="#">Ana Sayfa</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3 text-white">
            <h2>Hasta Listesi</h2>
            <button class="btn btn-success" onclick="yeniKayitAc()">+ Yeni Hasta</button>
        </div>
        <hr class="text-secondary">
        <div class="">

        </div>
    </div>
    <div id="patientList" class="row g-3 mx-1">

    </div>

    <div class="modal fade" id="designModal" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="designModalLabel">Hasta Düzenle</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="patient-name" class="col-form-label">Hayvan Adı</label>
                            <input type="text" class="form-control" id="patient-name">
                        </div>
                        <div class="mb-3">
                            <label for="treatment-text" class="col-form-label">Tedavi Açıklaması</label>
                            <textarea class="form-control" id="treatment-text"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-primary" id="btnKaydet">Değişiklikleri Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <div id="addFormContainer" class="container mt-5 bg-dark text-white shadow mb-5 d-none" style="border-top: 5px solid #0d6efd">
        <h4 class="mt-3">Yeni Hasta Ekle</h4>
        <p class="text-secondary">Hasta bilgilerini eksiksiz giriniz.</p>
        <form id="hastaForm">
            <div class="mb-3">
                <label class="form-label">Hayvan Adı</label>
                <input type="text" name="AnimalName" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Tedavi Açıklaması</label>
                <textarea class="form-control" name="TreatmentDescription"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6  mb-3">
                    <label class="form-label">Tür</label>
                    <input type="text" name="Species" required class="form-control" />
                </div>
                <div class="col-md-6  mb-3">
                    <label class="form-label">Cins</label>
                    <input type="text" name="Breed" required class="form-control" />
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Sahip Adı</label>
                <input type="text" name="OwnerName" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Geliş Tarihi</label>
                <input type="date" name="VisitDate" class="form-control" required />
            </div>
            <div class="form-check mb-3">
                <input type="hidden" name="IsVaccinated" value="false" />

                <input type="checkbox"
                       name="IsVaccinated"
                       value="true" />
                <label class="form-label">Aşıları Tam</label>
            </div>
            <button type="button" class="btn btn-danger mb-3" onclick="formuKapat()">İptal</button>
            <button type="submit" class="btn btn-success mb-3">Kaydet</button>
        </form>
    </div>



    <script>

        const apiUrl = "https://localhost:7123/api/Patients"
        const patientList = document.getElementById("patientList");


        document.addEventListener("DOMContentLoaded", function () {
            HastaListele();
        });

        function HastaListele() {
            patientList.classList.remove("d-none");

            fetch(apiUrl)
                .then((res) => res.json())
                .then((data) => {
                    patientList.innerHTML = "";

                    data.forEach(function (p) {
                        patientList.innerHTML += `

                                             <div class="col-12 col-md-6 col-lg-3  ">
                                                <div class="card h-100 bg-dark text-white border-secondary shadow" style="border-top: 5px solid #0d6efd">
                                                    <div class="card-body">
                                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                                            <h4 class="card-title mb-0">${p.animalName}</h4>
                                                            <span class="badge rounded-pill" style="background-color: #854d0e; color: #fbbf24">${p.species}</span>
                                                        </div>
                                                        <div class="card-text mb-4">
                                                            <p class="mb-1 text-secondary">
                                                                <strong>Cins:</strong> <span class="text-light">${p.breed}</span>
                                                            </p>
                                                            <p class="mb-1 text-secondary">
                                                                <strong>Sahip:</strong> <span class="text-light">${p.ownerName}</span>
                                                            </p>
                                                        </div>
                                                        <div class="d-flex gap-2">
                                                            <button class="btn btn-primary w-100" data-id="${p.id}" onclick="duzenle(${p.id})" data-bs-target="#designModal"data-bs-toggle="modal">Düzenle</button>
                                                            <button class="btn btn-danger w-100"onclick="hastaSil(${p.id})">Sil</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                                `;


                    });
                });
        }

        const animalNameInput = document.getElementById("patient-name")
        const treatmentInput = document.getElementById("treatment-text");
        let seciliHastaId = null;

        function duzenle(id) {
            console.log("Tıklanan hasta ID:", id);
            seciliHastaId = id;

            fetch(apiUrl + "/" + id)
                .then(res => res.json())
                .then(data => {
                    animalNameInput.value = data.animalName;
                    treatmentInput.value = data.treatmentDescription;
                });
        }


        document.getElementById("btnKaydet").addEventListener("click", function () {
            hastaGuncelle();
        })

        function hastaGuncelle() {

            const guncelHasta = {
                animalName: animalNameInput.value,
                treatmentDescription: treatmentInput.value
            };

            fetch(apiUrl + "/" + seciliHastaId, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(guncelHasta)
            })
                .then(res => {
                    if (res.ok) {
                        alert("Güncelleme başarılı");

                        const modal = bootstrap.Modal.getInstance(
                            document.getElementById("designModal")
                        );
                        modal.hide();

                        HastaListele();
                    };

                });

        }


        // post
        const addFormContainer = document.getElementById("addFormContainer");
        const hastaForm = document.getElementById("hastaForm");

        function yeniKayitAc() {
            hastaForm.reset();
            addFormContainer.classList.remove("d-none");

            addFormContainer.scrollIntoView({
                behavior: "smooth"
            });
        };



        hastaForm.addEventListener("submit", function (e) {
            e.preventDefault();

            const hasta = {
                animalName: hastaForm.AnimalName.value,
                treatmentDescription: hastaForm.TreatmentDescription.value,
                species: hastaForm.Species.value,
                breed: hastaForm.Breed.value,
                ownerName: hastaForm.OwnerName.value,
                visitDate: hastaForm.VisitDate.value,
                isVaccinated: hastaForm.IsVaccinated.checked
            };

            fetch("https://localhost:7123/api/Patients", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(hasta)
            })
                .then(res => {
                    if (!res.ok) throw new Error();
                })
                .then(() => {
                    hastaForm.reset();
                    addFormContainer.classList.add("d-none");
                    HastaListele();
                });
        });
        function formuKapat() {
            addFormContainer.classList.add("d-none");
            hastaFormu.reset();
        }

        //Delete
        function hastaSil(id) {
            if (!confirm("Bu hastayı silmek istediğine emin misin?")) return;

            fetch("https://localhost:7123/api/Patients/" + id, {
                method: "DELETE"
            })
                .then(res => {
                    if (!res.ok) throw new Error();
                })
                .then(() => {
                    HastaListele();
                });
        }


    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
